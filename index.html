          ${c.skus.map(s => {
          const p = parseSKU(s.sku);
          const info = getCatalog(p.codigo);
          return `<div style="margin-bottom:6px">
              <span class="sku-tag ${skuClass(s.status)}">${p.codigo} · ${p.color} · T${p.talle}${s.qty ? ` × ${s.qty}` : ''}<span style="opacity:0.6;margin-left:3px">${s.status || 'sin pedir'}</span></span>
              ${info ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:2px;margin-left:2px">${info.desc}${info.proveedores.length ? ' · <span style="color:var(--accent)">' + info.proveedores.join(' / ') + '</span>' : ''}</div>` : ''}
            </div>`;
        }).join('')}
        </div>
      </div>`: '';
        return `
      <tr class="clickable" id="row-${c.id}" data-pid="${c.id}" onclick="togglePedidoData(this)">
        <td class="td-name">${c.name}${c.vendedor ? `<small>👤 ${c.vendedor}</small>` : ''}</td>
        <td>${statusPill(c.listName)}</td>
        <td>${diasChip(c.diasCreacion)}</td>
        <td style="max-width:240px">${skuCells}</td>
        <td>${c.customVal ? `<span class="custom-tag">${c.customVal}</span>` : '<span style="color:var(--muted);font-size:0.75rem">—</span>'}</td>
        <td><a href="${c.shortUrl}" target="_blank" class="trello-link" onclick="event.stopPropagation()">Abrir →</a></td>
      </tr>
      <tr class="detail-row" id="detail-${c.id}" style="display:none">
        <td colspan="6">
          <div class="detail-content">
            ${detailFields}
            ${skuDetail}
          </div>
        </td>
      </tr>`;
      }).join('');

      document.getElementById('mainContent').innerHTML = `
    ${kpis}

    <div class="panel" style="margin-bottom:0">
      <div class="panel-header"><span class="panel-title">⏱ Antigüedad de pedidos</span><span class="badge">${rankingCards.length} pedidos · más viejo primero</span></div>
      <div class="filter-bar" style="flex-wrap:wrap;gap:0.5rem 1rem;padding:0.75rem 1.5rem;border-bottom:1px solid var(--border)">
        <span class="filter-label">Buscar:</span>
        <input type="text" id="fRankText" placeholder="Cliente o pedido..." oninput="handleRankText(this.value)" value="${fRankText}" style="max-width:220px" />
        <span class="filter-label">Vendedor:</span>
        <select onchange="handleRankVendedor(this.value)" style="font-family:var(--mono);font-size:0.82rem;border:1.5px solid var(--border);border-radius:8px;padding:0.38rem 0.7rem;background:#fff;color:var(--text);max-width:160px">
          <option value="">Todos</option>
          ${rankVendedorOpts.map(v => `<option value="${v}"${fRankVendedor === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
        <span class="filter-label">Estado:</span>
        <select onchange="handleRankEstado(this.value)" style="font-family:var(--mono);font-size:0.82rem;border:1.5px solid var(--border);border-radius:8px;padding:0.38rem 0.7rem;background:#fff;color:var(--text);max-width:180px">
          <option value="">Todos</option>
          ${rankEstadoOpts.map(v => `<option value="${v}"${fRankEstado === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
        ${(fRankText || fRankVendedor || fRankEstado) ? '<button onclick="clearRankSearch()" style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.85rem;color:var(--muted);font-size:0.78rem;cursor:pointer">✕ Limpiar</button>' : ''}
      </div>
      ${rankingHTML}
    </div>

    <div style="height:1.5rem"></div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Todos los pedidos</span><span class="badge">${tableCards.length} tarjetas</span></div>
      <div class="filter-bar" style="flex-wrap:wrap;gap:0.5rem 1rem;padding:0.75rem 1.5rem;border-bottom:1px solid var(--border)">
        <span class="filter-label">Buscar:</span>
        <input type="text" id="fText" placeholder="Cliente o pedido..." oninput="handleSearch(this.value)" value="${filter}" style="max-width:220px" />
        <span class="filter-label">Vendedor:</span>
        <select onchange="handleFiltroVendedor(this.value)" style="font-family:var(--mono);font-size:0.82rem;border:1.5px solid var(--border);border-radius:8px;padding:0.38rem 0.7rem;background:#fff;color:var(--text);max-width:160px">
          <option value="">Todos</option>
          ${vendedorOpts.map(v => `<option value="${v}"${fVendedor === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
        <span class="filter-label">Estado:</span>
        <select onchange="handleFiltroEstado(this.value)" style="font-family:var(--mono);font-size:0.82rem;border:1.5px solid var(--border);border-radius:8px;padding:0.38rem 0.7rem;background:#fff;color:var(--text);max-width:180px">
          <option value="">Todos</option>
          ${estadoOpts.map(v => `<option value="${v}"${fEstado === v ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
        ${(filter || fVendedor || fEstado) ? '<button onclick="clearSearch()" style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.85rem;color:var(--muted);font-size:0.78rem;cursor:pointer">✕ Limpiar</button>' : ''}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Pedido</th><th>Estado</th><th>Antigüedad</th><th>SKUs faltantes</th><th>Customización</th><th></th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
  `;

      // Compras tab
      const articulosInvolucrados = new Set(Object.values(provMap).flatMap(p => Object.keys(p.arts))).size;
      document.getElementById('comprasContent').innerHTML = `
    <div class="kpi-grid" style="margin-bottom:1.5rem">
      <div class="kpi" style="--kpi-color:var(--danger)">
        <div class="kpi-label">Pedidos que requieren compra</div>
        <div class="kpi-value" style="color:var(--danger)">${faltCards.length}</div>
        <div class="kpi-sub">con SKU sin pedir</div>
      </div>
      <div class="kpi" style="--kpi-color:var(--danger)">
        <div class="kpi-label">Unidades sin pedir</div>
        <div class="kpi-value" style="color:var(--danger)">${totalSkusSinPedir}</div>
        <div class="kpi-sub">por comprar</div>
      </div>
      <div class="kpi" style="--kpi-color:var(--accent2)">
        <div class="kpi-label">Unidades ya pedidas</div>
        <div class="kpi-value" style="color:var(--accent2)">${totalSkusPedido}</div>
        <div class="kpi-sub">en espera de recepción</div>
      </div>
      <div class="kpi" style="--kpi-color:var(--accent)">
        <div class="kpi-label">Proveedores involucrados</div>
        <div class="kpi-value" style="color:var(--accent)">${Object.keys(provMap).length}</div>
        <div class="kpi-sub">con faltantes a pedir</div>
      </div>
      <div class="kpi" style="--kpi-color:var(--purple)">
        <div class="kpi-label">Artículos involucrados</div>
        <div class="kpi-value" style="color:var(--purple)">${articulosInvolucrados}</div>
        <div class="kpi-sub">códigos distintos a comprar</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:1.5rem;margin-bottom:1.5rem">
      <div class="panel" style="margin-bottom:0">
        <div class="panel-header"><span class="panel-title">🔴 SKUs sin pedir · Por pedido</span><span class="badge ${faltCards.length > 0 ? 'danger' : 'success'}">${faltCards.length} pedidos</span></div>
        ${faltHTML}
      </div>
      <div class="panel" style="margin-bottom:0">
        <div class="panel-header"><span class="panel-title">🔴 Resumen global de compras</span><span class="badge ${Object.keys(provMap).length > 0 ? 'danger' : 'success'}">${Object.keys(provMap).length} proveedores</span></div>
        <div>${skuResumenHTML}</div>
      </div>
    </div>
    <div style="height:1.5rem"></div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">✅ SKUs pedidos · Por proveedor</span>
        <span class="badge ${Object.keys(provMapPedido).length > 0 ? '' : 'success'}">${Object.keys(provMapPedido).length} proveedores · ${Object.values(provMapPedido).reduce((s, p) => s + Object.keys(p.arts).length, 0)} artículos</span>
      </div>
      <div>${skuTodosHTML}</div>
    </div>
  `;

      // Restore KPI state if active
      if (activeKpi) {
        document.getElementById('kpi-' + activeKpi)?.click();
        activeKpi = null;
      }
    }

    function toggleGroup(id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); }
    function toggleGroupById(el) { toggleGroup(el.getAttribute('data-gid')); }
    function toggleSkuSubById(el) { toggleSkuSub(el.getAttribute('data-sid')); }

    setInterval(() => { if (API_KEY) loadData(); }, 300000);

    window.addEventListener('DOMContentLoaded', () => {
      const k = localStorage.getItem('trello_key');
      const t = localStorage.getItem('trello_token');
      const b = localStorage.getItem('trello_board');
      if (k && t && b) {
        API_KEY = k; TOKEN = t; BOARD_ID = b;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>

</html>
